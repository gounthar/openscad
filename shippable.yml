language: none

sudo: required

runtime:
  nodePool: shippable_shared_aarch32
 
build:
 ci:
  - apt update && apt upgrade && apt install git
  - git clone git://github.com/openscad/openscad.git && cd openscad && git submodule update --init
  - ./scripts/uni-get-dependencies.sh && qmake openscad.pro && make -j 24
